<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 应用案例库｜企业 AI 技术路线选择</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-top">
    <div class="top-inner">
      <a class="brand" href="#">AI Route Lab<span class="dot">.</span></a>
      <nav class="nav" aria-label="主导航">
        <a href="#">课程资源</a>
        <a href="#">技术路线</a>
        <a href="#">案例库</a>
        <a href="#">课堂互动</a>
      </nav>
      <div class="top-actions">
        <label class="searchbox" aria-label="搜索案例">
          <span>⌕</span>
          <input id="globalSearch" type="search" placeholder="Search" />
        </label>
        <button class="icon-btn" id="printPage" title="打印或保存为 PDF">⎙</button>
        <button class="icon-btn" title="语言">CN</button>
      </div>
    </div>
  </header>
  <div class="green-bar">
    <div class="green-inner">
      <a href="#">企业 AI 技术路线</a>
      <a href="#">Contact us</a>
      <button type="button" id="downloadAll">Download the full dossier</button>
      <button type="button" id="downloadFiltered">Download the current cuts</button>
    </div>
  </div>

  <main class="main">
    <h1 class="page-title">AI use cases</h1>

    <section class="filter-area" aria-label="案例筛选">
      <div class="filter-label">
        <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M5 8h22M5 16h22M5 24h22"/><circle cx="11" cy="8" r="3"/><circle cx="21" cy="16" r="3"/><circle cx="15" cy="24" r="3"/></svg>
        <span>FILTERS</span>
      </div>
      <div class="filters-grid"></div>
    </section>

    <div class="chips"></div>
    <hr class="divider-line" />

    <section class="results-head">
      <h2 id="caseCount">(0 use cases)</h2>
      <div class="pager" aria-label="分页">
        <button type="button" id="prevPage" aria-label="上一页">‹</button>
        <span id="pageIndicator" class="page-indicator">1/1</span>
        <button type="button" id="nextPage" aria-label="下一页">›</button>
      </div>
    </section>

    <section class="case-grid" aria-label="AI 应用案例列表"></section>

    <div class="footer-tools">
      <span>提示：点击卡片可查看“业务场景、推荐技术路线、风险控制、课堂追问”。</span>
      <button type="button" class="ghost-btn" id="clearFilters">CLEAR FILTER(S)</button>
    </div>
  </main>

  <div class="dialog-backdrop" aria-hidden="true">
    <article class="case-dialog" role="dialog" aria-modal="true"></article>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
